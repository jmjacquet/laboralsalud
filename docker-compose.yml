version: "3.9"

services:
  laboralsalud:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${CONTAINER_NAME:-laboralsalud_app}
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: 1
      # All other environment variables set in Dokploy UI
    volumes:
      - ${VOLUME_PREFIX:-laboral}_static:/app/static
      - ${VOLUME_PREFIX:-laboral}_media:/app/media
      - ${VOLUME_PREFIX:-laboral}_logs:/app/logs
    ports:
      - "8000:8000"
    networks:
      - dokploy-network
    labels:
      - traefik.docker.network=dokploy-network
      - traefik.enable=true

volumes:
  ${VOLUME_PREFIX:-laboral}_static:
    driver: local
  ${VOLUME_PREFIX:-laboral}_media:
    driver: local
  ${VOLUME_PREFIX:-laboral}_logs:
    driver: local

networks:
  dokploy-network:
    external: true