version: '3.9'

services:
  laboralsalud:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laboralsalud_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override specific vars if needed
      PYTHONUNBUFFERED: 1
      # DB_HOST should match your MariaDB service name in Dokploy
      DB_HOST: mariadb
      DB_PORT: 3306
    volumes:
      - laboral_static:/app/static
      - laboral_media:/app/media
      - laboral_logs:/app/logs
    ports:
      - "8000:8000"
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  laboral_static:
    driver: local
  laboral_media:
    driver: local
  laboral_logs:
    driver: local

networks:
  app_network:
    external: true
    name: production_apps_network