version: '3.9'

services:
  laboralsalud:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laboralsalud_app
    restart: unless-stopped
    # Comment out for production (use Dokploy env vars)
    # Uncomment for local development with .env file
    # env_file:
    #   - .env
    environment:
      # Defaults (will be overridden by Dokploy or .env)
      PYTHONUNBUFFERED: 1
      DB_HOST: ${DB_HOST:-mariadb}
      DB_PORT: ${DB_PORT:-3306}
      # Gunicorn configuration
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-60}
      GUNICORN_BIND: ${GUNICORN_BIND:-0.0.0.0:8000}
    volumes:
      - laboral_static:/app/static
      - laboral_media:/app/media
      - laboral_logs:/app/logs
    ports:
      - "8000:8000"
    networks:
      - default

volumes:
  laboral_static:
    driver: local
  laboral_media:
    driver: local
  laboral_logs:
    driver: local

# Use default network or remove network section entirely
networks:
  default:
    external: false