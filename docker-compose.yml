version: "3.9"

services:
  laboralsalud:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laboralsalud
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: 1
      ENV: ${ENV:-production}
      DEBUG: ${DEBUG:-False}
      GUNICORN_WSGI: ${GUNICORN_WSGI:-laboralsalud.wsgi:application}
      DB_HOST: ${DB_HOST:-mariadb_shared}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-lbls}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      SECRET_KEY: ${SECRET_KEY}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-laboral_session_prod}
      SERVER_EMAIL: ${SERVER_EMAIL}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-60}
      GUNICORN_BIND: ${GUNICORN_BIND:-0.0.0.0:8000}
      COLLECT_STATIC: ${COLLECT_STATIC:-false}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
    volumes:
      - laboral_static:/app/static
      - laboral_media:/app/media
      - laboral_logs:/app/logs
    ports:
      - "8000:8000"
    networks:
      - dokploy-network
    labels:
      - traefik.docker.network=dokploy-network
      - traefik.enable=true

volumes:
  laboral_prod_static:
    driver: local
  laboral_prod_media:
    driver: local
  laboral_prod_logs:
    driver: local

networks:
  dokploy-network:
    external: true